<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Híbrida - Puebla Comparte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .camp-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; transition: all 0.3s; position: relative; }
        .phase-btn { min-width: 75px; flex: 1; padding: 10px 4px; border-radius: 12px; text-align: center; font-size: 0.6rem; border: 1px solid #e2e8f0; cursor: pointer; }
        .phase-on { background: #dcfce7; color: #166534; border-color: #86efac; font-weight: 700; }
        .phase-next { background: #eff6ff; color: #1e40af; border: 2px solid #3b82f6; font-weight: 900; animation: pulse-blue 2s infinite; }
        .phase-off { background: #f1f5f9; color: #94a3b8; }
        @keyframes pulse-blue { 0%, 100% { border-color: #3b82f6; } 50% { border-color: #bfdbfe; } }
    </style>
</head>
<body class="p-4 md:p-8 max-w-2xl mx-auto pb-20">

    <header class="mb-10 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black tracking-tighter text-slate-900">Logística Puebla</h1>
            <p class="text-indigo-600 font-bold text-[10px] uppercase tracking-widest">Gestión de Carga Híbrida</p>
        </div>
        <div class="flex gap-2">
            <button onclick="exportarBackup()" title="Respaldo" class="p-3 bg-white border rounded-2xl shadow-sm hover:bg-slate-50 transition">💾</button>
            <button onclick="document.getElementById('importInput').click()" title="Cargar" class="p-3 bg-white border rounded-2xl shadow-sm hover:bg-slate-50 transition">📂</button>
            <input type="file" id="importInput" class="hidden" accept=".json" onchange="importarBackup(event)">
        </div>
    </header>

    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 mb-10">
        <form id="op-form" class="space-y-4">
            <input type="text" id="name" placeholder="Nombre de la Campaña / Aliado" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold" required>
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="contact" placeholder="Responsable" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm">
                <input type="text" id="loc" placeholder="Ubicación" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm">
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-indigo-600 transition-all shadow-xl uppercase text-xs tracking-widest">Iniciar Seguimiento</button>
        </form>
    </div>

    <div id="active-list" class="space-y-8"></div>
    <div id="history-list" class="mt-12 space-y-8 border-t-4 border-slate-100 pt-10"></div>

    <script>
        const PHASES = ['Inicio', 'Contenedores', 'Arranque', '1ra Rec.', 'Ult. Rec.', 'Cierre'];
        let ops = JSON.parse(localStorage.getItem('puebla_ops_v3')) || [];

        function save() {
            localStorage.setItem('puebla_ops_v3', JSON.stringify(ops));
            render();
        }

        document.getElementById('op-form').onsubmit = (e) => {
            e.preventDefault();
            const newOp = {
                id: Date.now(),
                name: document.getElementById('name').value,
                contact: document.getElementById('contact').value,
                loc: document.getElementById('loc').value,
                status: PHASES[0],
                detalleContenedores: [],
                lastMove: Date.now(),
                dates: { [PHASES[0]]: new Date().toLocaleDateString('es-MX') }
            };
            ops.unshift(newOp);
            save();
            e.target.reset();
        };

        window.advance = (id) => {
            const op = ops.find(o => o.id === id);
            const idx = PHASES.indexOf(op.status);
            
            if (idx < PHASES.length - 1) {
                const nextPhase = PHASES[idx + 1];

                // LÓGICA DE CONTENEDORES HÍBRIDA
                if (nextPhase === 'Contenedores') {
                    let agregando = true;
                    while(agregando) {
                        const opcion = prompt("¿Qué tipo de contenedor deseas agregar?\n1. Plegable Beige\n2. Pequeño (Color)");
                        
                        if (opcion === "1") {
                            const cant = prompt("¿Cuántos PLEGABLES BEIGE?", "1");
                            op.detalleContenedores.push({ tipo: "Plegable Beige", cant: cant || "1" });
                        } else if (opcion === "2") {
                            const color = prompt("Color del contenedor PEQUEÑO:", "Naranja");
                            const cant = prompt(`¿Cuántos Pequeños de color ${color || 'Naranja'}?`, "1");
                            op.detalleContenedores.push({ tipo: `Pequeño (${color || 'Naranja'})`, cant: cant || "1" });
                        } else {
                            alert("Opción no válida.");
                        }
                        
                        agregando = confirm("¿Deseas agregar OTRO TIPO o COLOR de contenedor a esta campaña?");
                    }
                }

                if (nextPhase === 'Cierre') {
                    op.kilos = prompt("Campaña Finalizada. ¿Kilos totales?", "0");
                    op.end = new Date().toISOString();
                }

                op.status = nextPhase;
                op.dates[nextPhase] = new Date().toLocaleDateString('es-MX');
                op.lastMove = Date.now();
                save();
            }
        };

        window.editDate = (id, phase) => {
            const op = ops.find(o => o.id === id);
            const newVal = prompt(`Editar fecha para ${phase}:`, op.dates[phase] || "--/--/--");
            if(newVal) { op.dates[phase] = newVal; save(); }
        };

        function remove(id) {
            if(confirm("¿Eliminar registro?")) { ops = ops.filter(o => o.id !== id); save(); }
        }

        function render() {
            const active = document.getElementById('active-list');
            const history = document.getElementById('history-list');
            active.innerHTML = '<h2 class="text-xs font-black text-slate-400 mb-6 uppercase tracking-widest">🚀 Campañas Activas</h2>';
            history.innerHTML = '<h2 class="text-xs font-black text-slate-300 mb-6 uppercase tracking-widest italic font-serif">📂 Historial de Cierres</h2>';

            ops.forEach(o => {
                const isFinal = o.status === 'Cierre';
                
                const inventarioHtml = o.detalleContenedores.map(c => 
                    `<span class="inline-block bg-indigo-50 text-indigo-700 text-[10px] font-black px-2 py-1 rounded-md border border-indigo-100 mr-1 mb-1 italic">
                        ${c.cant} x ${c.tipo}
                    </span>`
                ).join('');

                const cardHtml = `
                    <div class="camp-card p-6 shadow-xl shadow-slate-200/50 mb-6 border-t-4 ${isFinal ? 'border-emerald-400' : 'border-indigo-400'}">
                        <button onclick="remove(${o.id})" class="absolute top-6 right-6 text-slate-300 hover:text-red-500 transition">✕</button>
                        <div class="mb-4 pr-10">
                            <h3 class="text-xl font-black text-slate-900 leading-tight">${o.name}</h3>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-1 mb-3">📍 ${o.loc} | 👤 ${o.contact}</p>
                            <div class="flex flex-wrap">${inventarioHtml}</div>
                        </div>
                        <div class="flex gap-1 mb-6 overflow-x-auto pb-2">
                            ${PHASES.map(p => {
                                let style = o.dates[p] ? "phase-on" : (o.status === p ? "phase-next" : "phase-off");
                                return `<div onclick="editDate(${o.id}, '${p}')" class="phase-btn ${style}">
                                            <div class="uppercase text-[6px] mb-1">${p}</div>
                                            <div class="text-[9px] font-bold">${o.dates[p] || '--/--'}</div>
                                        </div>`;
                            }).join('')}
                        </div>
                        ${!isFinal ? `
                            <button onclick="advance(${o.id})" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-indigo-600 transition-all text-xs tracking-widest uppercase">
                                AVANZAR A ${PHASES[PHASES.indexOf(o.status) + 1]} ➔
                            </button>
                        ` : `
                            <div class="bg-emerald-50 p-4 rounded-2xl flex justify-between items-center border border-emerald-100">
                                <div>
                                    <p class="text-[9px] font-black text-emerald-600 uppercase">Total Recolectado</p>
                                    <p class="text-lg font-black text-slate-800">${o.kilos} Kg</p>
                                </div>
                                <span class="text-2xl">🚛</span>
                            </div>
                        `}
                    </div>`;
                if (isFinal) history.innerHTML += cardHtml;
                else active.innerHTML += cardHtml;
            });
        }

        function exportarBackup() {
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(ops));
            const link = document.createElement('a');
            link.setAttribute('href', dataUri);
            link.setAttribute('download', `Logistica_Backup.json`);
            link.click();
        }
        function importarBackup(event) {
            const reader = new FileReader();
            reader.onload = (e) => { ops = JSON.parse(e.target.result); save(); };
            reader.readAsText(event.target.files[0]);
        }

        render();
    </script>
</body>
</html>
